<svg xmlns="http://www.w3.org/2000/svg" width="600" height="146">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="600" height="146" rx="10" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  <text x="20" y="50" font-size="50" fill="#58a6ff" font-family="Georgia,serif">“</text>
  <text x="55" y="55" font-size="15" fill="#c9d1d9" font-family="Arial,Helvetica,sans-serif">Programs must be written for people to read,</text>
  <text x="55" y="77" font-size="15" fill="#c9d1d9" font-family="Arial,Helvetica,sans-serif">and only incidentally for machines to</text>
  <text x="55" y="99" font-size="15" fill="#c9d1d9" font-family="Arial,Helvetica,sans-serif">execute.</text>
  <text x="55" y="141" font-size="13" fill="#58a6ff" font-family="Arial,Helvetica,sans-serif">— Harold Abelson</text>
</svg>